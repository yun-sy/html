<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>프런트 엔드 개발자 지원서</h1>
    <p>HTML, CSS, 자바스크립트의 기술을 이해하고 실무 경험이 있는 분을 찾습니다.</p>
    <hr>
    <div>
        <p><b>개인 정보</b></p>
        <label for="user-name">이름 </label>
        <input type="text" id="user-name" autofocus placeholder="공백 없이 입력하세요.""><br>
        <label for=" phone">연락처 </label>
        <input type="tel" id="phone"><br>
    </div><br>

    <div>
        <p><b>지원 분야</b></p>
        <label><input type="radio" name="part" value="1">웹 퍼블리싱</label><br>
        <label><input type="radio" name="part" value="2">웹 애플리케이션 개발</label><br>
        <label><input type="radio" name="part" value="3">개발 환경 개선</label>
    </div><br>


    <div>
        <p><b>지원 동기</b></p>
        <textarea cols="60" rows="5" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea><br>
        <input type="submit" value="접수하기">
        <input type="reset" value="다시 쓰기">
    </div>





</body>

</html>
