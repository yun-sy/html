<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        div {
            width: 100px;
            height: 100px;
            border: 1px solid #000;
            padding: 10px;
            background-color: red; 
        }
        #box1{
            /* content 영역만 기준 */
            box-sizing: content-box;
        }
        #box2{
            /* content + padding + border 기준 */
            box-sizing: border-box;
            box-shadow: 5px 5px 5px #f00;
        }
    </style>
</head>
<body>
    <div id="box1"></div><br>
    <div id="box2"></div>
</body>
</html>
