<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> -->
    <style>
        div {
            width: 100px;
            height: 100px;
            border: 1px solid #000;
            padding: 10px;
            background-color: red; 
        }
        #box1{
            /* content 영역만 기준 */
            box-sizing: content-box;
        }
        #box2{
            /* content + padding + border 기준 */
            box-sizing: border-box;
            box-shadow: 5px 5px 5px #f00;
        }
        span{
            border: 1px solid #000;
            width: 100px;
            height: 100px;
            /* 인라인 속성은 width, height 적용 불가, margin은 좌/우만 적용 */
            /* display: none; */
            visibility: hidden;
            margin: 10px;

        }
    </style>
</head>
<body>
    <div id="box1"></div>
    <p></p>
    <div id="box2"></div>
    <p></p>
    <span>안녕하세요</span>
    반갑습니다
</body>
</html>
