<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            caption-side: bottom;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px dotted black;
            padding: 10px;
            text-align: center;
        }

        th,
        td {
            padding: 10px 20px;
        }

        #wrap{
            width: 200px;
            height: 100px;
            border: 1px solid #222;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <h2>상품구성</h2>
        <table>
            <caption>선물용과 가정용 상품 구성</caption>
            <tr>
                <th>용도</th>
                <th>중량</th>
                <th>개수</th>
                <th>가격</th>
            </tr>
            <tr>
                <td rowspan="2">선물용</td>
                <td>3kg</td>
                <td>11~16과</td>
                <td>35,000원</td>
            </tr>
            <tr>
                <td>5kg</td>
                <td>18~26과</td>
                <td>52,000원</td>
            </tr>
            <tr>
                <td rowspan="2">가정용</td>
                <td>3kg</td>
                <td>11~16과</td>
                <td>30,000원</td>
            </tr>
            <tr>
                <td>5kg</td>
                <td colspan="2">미정</td>
            </tr>
        </table>
    </div>

</body>

</html>
