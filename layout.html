<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #wrap {
            width: 1000px;
            margin: auto;
        }

        .section {
            border: 1px solid black;
            text-align: center;
            background-color: #ddd;
        }

        .header {
            padding: 40px 0px;
        }

        .menu {
            height: 40px;
        }

        /* .container {
            height: 100px;
            border: 1px solid black;
            background-color: #ddd;
        } */
        .submenu {
            float: left;
            padding: 100px 0px;
            width: 30%;
            box-sizing: border-box;
        }

        .content {
            float: right;
            padding: 100px 0px;
            width: 70%;
            box-sizing: border-box;
        }

        .footer {
            padding: 30px 0px;
            clear: both;
        }

        .menu > ul {
            margin: 0;
            padding: 0;
        }

        .menu > ul > li {
            box-sizing: border-box;
            list-style: none;
            width: 25%;
            height: 40px;
            border: 1px solid black;
            line-height: 40px;
            float: left;
        }

        .menu > ul > li:hover{
            background-color: white;
        }

        
    </style>
</head>

<body>
    <div id="wrap">

        <div class="header section">HEADER</div>

        <div class="menu section">
            <ul>
                <li>MENU1</li>
                <li>MENU2</li>
                <li>MENU3</li>
                <li>MENU4</li>
            </ul>
        </div>
        <div class="container">
            <div class="submenu section">SUBMENU</div>
            <div class="content section">CONTENT</div>
        </div>
        
        <div class="footer section">FOOTER</div>



    </div>

</body>

</html>
