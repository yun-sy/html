<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 100px;
            height: 100px;
        }

        #box1 {
            position: relative;
            background-color: red;
            left: 50px;
            top: 50px;
        }
        #box2 {
            position: relative;
            background-color: orange;
            left: 50px;
            top: 50px;
        }
        #box3 {
            position: relative;
            background-color: yellow;
        }
        #container {
            position: relative;
            left: 300px;
            top: 300px;
            width: 500px;
            height: 500px;
            border: 1px solid #000;
            
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="box1"></div>
        <div id="box2"></div>
        <div id="box3"></div>
    </div>

</body>

</html>
